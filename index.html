<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>TEXTO DEL REVES</title>
</head>

<body class="bg-linear-to-r from-cyan-200 to-cyan-50 min-h-screen p-2 sm:p-4">

  <header class="border-4 border-cyan-700 border-dashed bg-linear-to-r from-cyan-400 to-green-100 rounded-3xl mt-2 mb-20 mx-auto w-[95%] p-6 sm:p-6 lg:border-8 lg:p-10 lg:w-4/5">
    <h1 class="text-center text-3xl sm:text-3xl lg:text-4xl 2xl:text-5xl text-white font-bold [text-shadow:0_0_12px_rgba(22,163,74,1)]">
      TEXTO DEL REVES
    </h1>
  </header>

  <main>
    <details open class="mb-20 mx-auto w-[95%] sm:w-[95%] lg:w-4/5 border-2 border-cyan-300 rounded-2xl p-4 bg-cyan-50/50">
      <summary class="cursor-pointer bg-linear-to-r from-cyan-500 to-green-100 rounded-2xl w-full p-2 pl-4 text-white font-bold mb-4 shadow-md hover:from-cyan-600 hover:to-green-300 transition-all">
        Texto del reves
      </summary>
      <p class="px-4 text-cyan-800 font-medium max-w-4xl">
        Programa una función que invierta las palabras de una cadena de texto, pe. miFuncion("Hola Mundo") devolverá "odnuM aloH"
      </p>
    </details>

    <section class="flex flex-col lg:flex-row items-center justify-center gap-16 px-4 lg:ml-20 2xl:ml-40 transition-all duration-300">
      
      <section class="w-full sm:w-[90%] md:w-3/4 lg:w-1/2 border-cyan-700 border-2 border-solid bg-linear-to-r from-cyan-600 to-green-200 rounded-2xl pb-5 pt-2 flex flex-col items-center">
        
        <h2 class="text-center pb-4 text-cyan-800 bg-linear-to-r from-cyan-400 to-green-200 font-bold text-3xl border border-solid border-cyan-600 rounded-2xl w-3/5 mb-8">
          texto
        </h2>

        <div class="w-full px-8 flex flex-col items-center gap-4">
          <label class="text-cyan-950 font-bold self-start">Introduce un texto: </label>
          <input class="border-green-600 rounded-2xl w-full bg-linear-to-r from-green-100 to-green-50 border border-solid p-2" type="text" id="texto" />

          <button class="border-green-600 border-2 text-cyan-900 font-bold border-solid bg-linear-to-r from-cyan-500 to-green-100 rounded-2xl w-1/2 sm:w-1/3 py-2 mt-4 transition-all duration-300 ease-in-out cursor-pointer hover:bg-linear-to-r hover:scale-105 hover:from-green-600 hover:to-cyan-100 hover:text-white hover:shadow-lg hover:shadow-green-600" id="calcular" type="button">
            MOSTRAR
          </button>

          <p class="w-full border border-solid border-green-600 bg-linear-to-r from-green-100 to-green-50 py-3 rounded-2xl text-center text-cyan-900 font-bold mt-4" id="resultado"></p>
        </div>
      </section>

      <div class="w-full lg:w-2/5 flex justify-center p-6">
        <img class="w-full max-w-[300px] lg:max-w-[500px] h-auto object-contain drop-shadow-xl" src="imagenes/tipo.png" alt="imagen de un texto" />
      </div>
    </section>
  </main>

  <script src="js/texto-del-reves.js"></script>
</body>
</html>
